stages:
  - build
  - push
  - deploy

# Global variables
variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2

# DRY template
.default_docker:
  image: docker:27

  services:
    - name: docker:27-dind
      command: ["--tls=false"]

  before_script:
    # Fail fast (important)
    - set -e

    # Install tools
    - apk add --no-cache make

    # Docker login
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    # Debug check
    - docker info


# -------------------------
# BUILD
# -------------------------
build:
  stage: build

  extends:
    - .default_docker

  script:
    - make test

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


# -------------------------
# PUSH
# -------------------------
push:
  stage: push

  extends:
    - .default_docker

  script:
    - make push

  needs:
    - build

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


# -------------------------
# DEPLOY
# -------------------------
deploy:
  stage: deploy

  image: alpine:3.21

  before_script:

    - set -e

    # Install ssh
    - apk add --no-cache openssh-client rsync

    # Setup ssh
    - mkdir -p ~/.ssh

    # Fix newline formatting issue (very important)
    - echo "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa

    - chmod 600 ~/.ssh/id_rsa

    # Known hosts (better than disabling check)
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

  script:

    # Copy compose
    - rsync -avz docker-compose.yaml $VPS_USER@$VPS_HOST:/home/$VPS_USER/app/

    # Deploy
    - |
      ssh $VPS_USER@$VPS_HOST "
        set -e

        cd /home/$VPS_USER/app

        docker compose pull

        docker compose up -d

        docker image prune -f
      "

  needs:
    - push

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
