variables:
  PROJECT_NAME: carolineatta997-frontend-lab
  IMAGE_TAG: $DOCKER_USERNAME/$PROJECT_NAME:latest

stages:
  - build

workflow:
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
          when: always
        - when: never

.default_docker: &docker_setup
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "Logging in to docker hub"
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

build_and_push:
  stage: build
  <<: *docker_setup
  script:
    - echo "Build and push docker image"
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
