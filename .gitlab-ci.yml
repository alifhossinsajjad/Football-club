stages:
  - test
  - build

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: never

test:
  stage: test
  image: oven/bun:1

  script:
    - bun install
    - bun run build

build:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update
    - echo "Logging in to docker hub"
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    # install make file and setup for run make file
    - apt-get install -y make
    - touch .env.local
    - touch .env.production
    - touch .env

  script:
    - echo "Docker information...."
    - docker info
    - echo "Building image"
    - make build
    - echo "Pushing image to docker hub"
    - make push
